name: Setup main branch and PR

on:
  push:
    branches: ["claude/add-privacy-policy-page-brBR2"]

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create main branch if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --heads origin main | grep -q main; then
            echo "main branch already exists, skipping creation"
          else
            git checkout --orphan main
            git rm -rf .
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "Initial commit"
            git push origin main
            echo "main branch created successfully"
          fi

      - name: Set main as default branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}" \
            -d '{"default_branch":"main"}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Could not set default branch (HTTP $http_code). Set it manually: Settings > General > Default Branch > main"
          else
            echo "Default branch set to main"
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list --head "claude/add-privacy-policy-page-brBR2" --base main --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            echo "PR #$existing_pr already exists"
          else
            gh pr create \
              --title "Add privacy policy page" \
              --head "claude/add-privacy-policy-page-brBR2" \
              --base main \
              --body "## Summary
          - Add bilingual (English/Spanish) privacy policy page with dark mode support
          - Add GitHub Actions workflow to deploy the site via GitHub Pages

          ## Test plan
          - [ ] Verify the privacy policy page renders correctly
          - [ ] Test language switching between English and Spanish
          - [ ] Confirm dark mode styling works
          - [ ] Verify GitHub Pages deployment succeeds after merge

          https://claude.ai/code/session_011oX8YQSftxUxTwZMcnzJaA"
            echo "Pull request created"
          fi
