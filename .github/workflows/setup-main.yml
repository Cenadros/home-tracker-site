name: Setup main branch and PR

on:
  push:
    branches: ["claude/add-privacy-policy-page-brBR2"]

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create main branch if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --heads origin main | grep -q main; then
            echo "main branch already exists, skipping creation"
          else
            git checkout --orphan main
            git rm -rf .
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "Initial commit"
            git push origin main
            echo "main branch created successfully"
          fi

      - name: Set main as default branch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}" \
            -d '{"default_branch":"main"}' && echo "Default branch set to main" || echo "::warning::Could not set default branch. Set it manually in repo Settings."

      - name: Create Pull Request via API
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d '{
              "title": "Add privacy policy page",
              "head": "claude/add-privacy-policy-page-brBR2",
              "base": "main",
              "body": "## Summary\n- Add bilingual (English/Spanish) privacy policy page with dark mode support\n- Add GitHub Actions workflow to deploy the site via GitHub Pages\n\n## Test plan\n- [ ] Verify the privacy policy page renders correctly\n- [ ] Test language switching between English and Spanish\n- [ ] Confirm dark mode styling works\n- [ ] Verify GitHub Pages deployment succeeds after merge\n\nhttps://claude.ai/code/session_011oX8YQSftxUxTwZMcnzJaA"
            }' | jq '{number: .number, html_url: .html_url}'
